<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>考试加载中...</title>
<style>body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5;font-family:sans-serif}
.box{text-align:center;padding:40px}.spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid #1a56db;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#dc2626;font-size:14px;margin-top:12px}
</style></head>
<body><div class="box"><div class="spinner"></div><p>考试页面加载中...</p><div id="err" class="err"></div></div>
<script>
fetch('https://cdn.jsdelivr.net/gh/463601545-create/train-app@main/exam.html')
.then(r=>r.text())
.then(html=>{
  document.open();
  document.write(html);
  document.close();
})
.catch(e=>{
  document.getElementById('err').textContent='加载失败，请刷新重试';
});
</script></body></html>
