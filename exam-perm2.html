<script>
const Q=[
// ===== 模块1 头发3层结构（1-12，共12题） =====
{m:"M1",q:"头发的生物属性是？",o:["可再生的活细胞组织","没有生命的死细胞组织","半活体角质组织","可自我修复的有机体"],a:1,e:"原文：头发是没有生命的死细胞组织。没有代谢、修复、再生。"},
{m:"M1",q:"以下关于头发自愈能力的说法，正确的是？",o:["头发能自我代谢和再生","结构破坏后只能表层修饰，无法自愈","用发膜可让头发再生","头皮血液会修复发干"],a:1,e:"原文：一旦结构破坏，无法自愈，只能表层修饰。"},
{m:"M1",q:"头发由内到外共分几层结构？",o:["两层","三层","四层","五层"],a:1,e:"原文：三层结构：毛小皮、皮质层、髓质层。"},
{m:"M1",q:"毛小皮的排列方式是？",o:["条状平铺","蜂窝状","鱼鳞状/瓦片式重叠排列","螺旋缠绕"],a:2,e:"原文：毛小皮鱼鳞状/瓦片式重叠排列，6-10层结构。"},
{m:"M1",q:"毛小皮一般由多少层结构组成？",o:["1-2层","3-5层","6-10层","12-15层"],a:2,e:"原文：毛小皮6-10层结构。"},
{m:"M1",q:"决定头发光泽、顺滑、锁水性、质感细腻度的是哪一层？",o:["毛小皮","皮质层","髓质层","头皮层"],a:0,e:"原文：毛小皮决定光泽、顺滑、锁水性、质感细腻度。"},
{m:"M1",q:"所有护发素、精油、发膜只作用于？",o:["皮质层","毛小皮(表皮层)","髓质层","毛囊"],a:1,e:"原文：所有护发素、精油、发膜，只作用于表皮层。"},
{m:"M1",q:"关于护发产品的核心定位，正确的是？",o:["护发素能修复内部受损结构","护发是修饰，烫染是改芯","护发可以改变卷度记忆","护发能重组二硫键"],a:1,e:"原文核心：护发是修饰，烫染是改芯。护发只能闭合鳞片、填补表层缝隙。"},
{m:"M1",q:"皮质层占头发体积的比例是？",o:["30%-50%","50%-70%","75%-90%","95%以上"],a:2,e:"原文：皮质层占头发体积75%-90%。"},
{m:"M1",q:"头发的弹性、韧性、颜色、卷度记忆和链键系统全部集中在？",o:["毛小皮","皮质层","髓质层","头皮"],a:1,e:"原文：所有弹性、韧性、颜色、卷度记忆、链键系统，全部集中在皮质层。"},
{m:"M1",q:"所有烫发、拉直、塑形改变的是头发的？",o:["毛小皮外壳","皮质层内部结构","髓质层中空区","毛囊深处"],a:1,e:"原文：所有烫发、拉直、塑形，全部只改变皮质层内部结构。"},
{m:"M1",q:"关于髓质层，下列说法正确的是？",o:["决定头发卷度","参与所有烫染化学反应","中心疏松中空、不参与任何烫染化学反应","决定头发颜色"],a:2,e:"原文：髓质层中心疏松中空结构，不参与任何烫染化学反应，对烫发无影响。"},

// ===== 模块2 四大链键系统（13-34，共22题） =====
{m:"M2",q:"烫发的本质是？",o:["改变头皮","控制四大链键的断裂与重组","清洁毛囊","补充营养"],a:1,e:"原文：烫发的本质，就是控制四大链键的断裂与重组。"},
{m:"M2",q:"以下哪种链键属于头发内部最强、最稳定的结构性键位？",o:["氢键","盐键","二硫键","角质键"],a:2,e:"原文：二硫键是头发内部最强、最稳定的结构性键位。"},
{m:"M2",q:"决定头发天生直、天生卷以及永久形态的是？",o:["氢键","二硫键","盐键","髓质层"],a:1,e:"原文：二硫键决定头发天生直、天生卷、永久形态。"},
{m:"M2",q:"二硫键又被称为？",o:["临时塑形键","永久定型键","离子键","蛋白骨架键"],a:1,e:"原文：二硫键即永久定型键。"},
{m:"M2",q:"烫发流程中「还原」环节做的事是？",o:["重组新二硫键","药水还原打断部分二硫键","只改变氢键","封闭毛鳞片"],a:1,e:"原文：药水还原 → 打断部分二硫键。"},
{m:"M2",q:"烫发「重组新二硫键」对应哪一步？",o:["还原软化","物理塑形","氧化定型","洗发清洁"],a:2,e:"原文：氧化定型 → 重新组合新二硫键。"},
{m:"M2",q:"二硫键成功重组后的卷度记忆特点是？",o:["遇水即恢复","水洗不掉、吹风不变","三天就反弹","只在干发时存在"],a:1,e:"原文：二硫键重组=永久卷度记忆，水洗不掉、吹风不变。"},
{m:"M2",q:"顾客头发烫完很快变直，最根本的原因是？",o:["卷杠选错","客户洗头太勤","二硫键断裂不足、重组不彻底","头皮出油过多"],a:2,e:"原文：不是杠子问题，是二硫键断裂不足、重组不彻底。"},
{m:"M2",q:"四大链键中数量最多、最弱、最活跃的是？",o:["二硫键","氢键","盐键","肽键"],a:1,e:"原文：氢键数量最多、最弱、最活跃。"},
{m:"M2",q:"氢键的可逆性特点是？",o:["不可逆","遇水、遇热自动断裂重组，完全可逆","只能化学药水打断","必须高温重置"],a:1,e:"原文：氢键遇水、遇热自动断裂重组，完全可逆。"},
{m:"M2",q:"日常吹风造型、电棒造型改变的是？",o:["二硫键","氢键","盐键","肽键"],a:1,e:"原文：吹风造型、电棒造型，全部只改变氢键。"},
{m:"M2",q:"为什么电棒卷一洗头就直了？",o:["二硫键没断","氢键洗头即恢复，没有永久记忆","盐键流失","肽键断裂"],a:1,e:"原文：氢键洗头即恢复，没有永久记忆。"},
{m:"M2",q:"氢烫的特点不包括以下哪一项？",o:["发质极致健康","卷度柔软","持久度偏弱","持久度极强且永久"],a:3,e:"原文：氢烫发质极致健康、卷度柔软、但是持久度偏弱。"},
{m:"M2",q:"盐键又叫什么？",o:["共价键","离子键","金属键","氢离子键"],a:1,e:"原文：盐键（离子键）。"},
{m:"M2",q:"盐键的强弱受什么控制？",o:["温度","PH酸碱度","湿度","光照"],a:1,e:"原文：盐键受PH酸碱度控制。"},
{m:"M2",q:"盐键决定头发的什么属性？",o:["颜色","支撑力、弹性、紧实度","光泽","卷度记忆"],a:1,e:"原文：盐键决定头发支撑力、弹性、紧实度。"},
{m:"M2",q:"顾客烫完软塌、无弹力、蓬松度差，最可能的链键问题是？",o:["氢键过多","二硫键过强","碱性过强流失盐键","肽键断裂"],a:2,e:"原文：碱性过强会流失盐键，头发烫完软塌、无弹力、蓬松度差。"},
{m:"M2",q:"头发蛋白质的主干骨架是？",o:["氢键","二硫键","盐键","肽键"],a:3,e:"原文：肽键是头发蛋白质的主干骨架键，极强、极稳定。"},
{m:"M2",q:"关于肽键，下列说法正确的是？",o:["正常烫发会破坏肽键","正常烫发不会破坏肽键","氢烫会断肽键","定型剂会断肽键"],a:1,e:"原文：正常烫发不会破坏肽键。"},
{m:"M2",q:"肽键一旦断裂，头发会变成什么状态？",o:["软化好处理","碳化、棉化、粉碎性损伤，彻底不可逆","容易上色","卷度更持久"],a:1,e:"原文：肽键断裂=头发碳化、棉化、粉碎性损伤，彻底不可逆。"},
{m:"M2",q:"烫断、烫废的头发的真正根因是？",o:["杠子太小","定型剂涂少","强碱、高温、过度软化破坏了肽键","顾客没用发膜"],a:2,e:"原文：所有烫断、烫废的头发，全部是强碱、高温、过度软化破坏了肽键。"},
{m:"M2",q:"以下哪项是四大链键中「不可逆损伤」的最终警戒线？",o:["氢键断裂","盐键流失","二硫键断裂","肽键断裂"],a:3,e:"原文：肽键断裂彻底不可逆，是不可逆损伤的最终警戒。"},

// ===== 模块3 烫发三步化学原理（35-52，共18题） =====
{m:"M3",q:"烫发完整的化学流程共分几步？",o:["两步","三步","四步","五步"],a:1,e:"原文：烫发三步——还原软化、物理塑形、氧化定型。"},
{m:"M3",q:"烫发的第一步是？",o:["物理塑形","还原软化","氧化定型","封闭毛鳞片"],a:1,e:"原文：第一步是还原软化。"},
{m:"M3",q:"还原软化用什么药水？",o:["酸性产品","碱性药水","中性精油","纯氧化剂"],a:1,e:"原文：碱性药水打开毛鳞片、进入皮质层。"},
{m:"M3",q:"软化的化学目的是？",o:["完全断裂所有键","断裂部分二硫键，让头发获得可塑性","重组二硫键","破坏肽键"],a:1,e:"原文：软化断裂部分二硫键，让头发获得可塑性。"},
{m:"M3",q:"门店软化的核心红线之一是？",o:["软化必须干发操作","软化必须湿发操作","软化必须先吹热风","软化用蛋白稀释"],a:1,e:"原文红线：软化必须湿发操作。"},
{m:"M3",q:"门店软化稀释药水浓度，只能用？",o:["护理水","清水/纯水","蛋白原液","酸性精华"],a:1,e:"原文红线：软化只能用清水稀释浓度。"},
{m:"M3",q:"软化全程绝对禁止添加？",o:["纯净水","任何护理、蛋白、修复类产品","卷杠","定型剂"],a:1,e:"原文红线：软化全程禁止加入任何护理、蛋白、修复类产品。"},

const MOD_NAMES={
  M1:"头发3层结构",
  M2:"四大链键系统",
  M3:"烫发三步化学原理",
  M4:"四大烫型体系",
  M5:"药水五档稀释",
  M6:"沙性自然卷破冰",
  M7:"双维诊断",
  M8:"综合应用"
};
const MOD_ORDER=["M1","M2","M3","M4","M5","M6","M7","M8"];

let cur=0,ans={},timer,sec=0,done=false,review=false,filter='all';
const TOTAL=Q.length, PASS=90;

function go(){
  document.getElementById('p1').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  timer=setInterval(()=>{sec++;document.getElementById('tr').textContent=fmt(sec)},1000);
  render();
}

function fmt(s){
  let m=Math.floor(s/60),ss=s%60;
  return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}

function render(){
  let q=Q[cur], el=document.getElementById('p2');
  let my=ans[cur], answered=my!==undefined;
  let modName=MOD_NAMES[q.m]||q.m;
  let h='<div class="qc"><div class="num">第 <b>'+(cur+1)+'</b> / '+TOTAL+' 题</div>';
  h+='<div class="modtag">'+modName+'</div>';
  h+='<div class="qt">'+q.q+'</div><div class="opts">';
  let letters=['A','B','C','D'];
  for(let i=0;i<4;i++){
    let cls='ob';
    if(answered){
      cls+=' off';
      if(i===q.a) cls+=' ok';
      if(i===my&&my!==q.a) cls+=' no';
      if(!done&&i===q.a&&my!==q.a) cls+=' hi';
    }
    h+='<div class="'+cls+'" onclick="pick('+i+')"><div class="lt">'+letters[i]+'</div><div>'+q.o[i]+'</div></div>';
  }
  h+='</div>';
  if(answered){
    h+='<div class="exp on">💡 '+(my===q.a?'回答正确！':'❌ 正确答案：'+letters[q.a]+'。')+q.e+'</div>';
  }else{
    h+='<div class="exp"></div>';
  }
  h+='</div>';

  if(review&&done){
    let tags='<div class="rvtag"><button class="'+(filter==='all'?'on':'')+'" onclick="flt(\'all\')">全部</button>';
    tags+='<button class="'+(filter==='wrong'?'on':'')+'" onclick="flt(\'wrong\')">❌ 错题</button>';
    tags+='<button class="'+(filter==='right'?'on':'')+'" onclick="flt(\'right\')">✅ 对题</button></div>';
    h=tags+h;
  }

  el.innerHTML=h;

  document.getElementById('pb').style.width=((cur+1)/TOTAL*100)+'%';
  document.getElementById('tl').textContent=(cur+1)+'/'+TOTAL;

  let nb=document.getElementById('bNext');
  let pb=document.getElementById('bPrev');
  pb.style.display=cur>0?'block':'none';

  if(cur===TOTAL-1&&!done){
    nb.textContent='交卷';nb.className='bsub';nb.onclick=submit;
  }else if(done){
    nb.textContent=review?'返回成绩':'查看成绩';nb.className='bsub';nb.onclick=showResult;
  }else{
    nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)};
  }
  if(done&&cur<TOTAL-1){nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)}}
}

function pick(i){
  if(ans[cur]!==undefined)return;
  ans[cur]=i;
  done||setTimeout(()=>{if(cur<TOTAL-1)nav(1);else render()},600);
  render();
}

function nav(d){
  let nc=cur+d;
  if(nc<0||nc>TOTAL-1)return;
  if(review&&filter!=='all'){
    let dir=d>0?1:-1;
    let found=false;
    for(let j=nc;j>=0&&j<TOTAL;j+=dir){
      let isWrong=ans[j]!==Q[j].a;
      if(filter==='wrong'&&isWrong){nc=j;found=true;break}
      if(filter==='right'&&!isWrong){nc=j;found=true;break}
    }
    if(!found)return;
  }
  cur=nc;render();
  window.scrollTo(0,0);
}

function submit(){
  done=true;review=false;
  clearInterval(timer);
  showResult();
}

function showResult(){
  document.getElementById('p2').classList.remove('on');
  document.getElementById('btm').style.display='none';
  document.getElementById('p3').classList.add('on');

  let right=0;
  for(let i=0;i<TOTAL;i++) if(ans[i]===Q[i].a) right++;
  let wrong=TOTAL-right;
  let score=right;
  let pass=score>=PASS;

  // 模块得分统计
  let modStats={};
  MOD_ORDER.forEach(m=>{modStats[m]={total:0,right:0}});
  for(let i=0;i<TOTAL;i++){
    let m=Q[i].m;
    if(!modStats[m]) modStats[m]={total:0,right:0};
    modStats[m].total++;
    if(ans[i]===Q[i].a) modStats[m].right++;
  }

  let el=document.getElementById('p3');
  let h='<div class="rp">';
  h+='<div class="circle '+(pass?'pass':'fail')+'"><div class="sn">'+score+'</div><div class="sl">分</div></div>';
  h+='<div class="rt">'+(pass?'🎉 恭喜通过':'💪 需要重考')+'</div>';
  h+='<div class="rs">'+(pass?'90分及格线，你已达标':'距及格还差'+(PASS-score)+'分，请重新考试')+'</div>';
  h+='<div class="sg"><div class="sc"><div class="sv g">'+right+'</div><div class="svl">答对</div></div>';
  h+='<div class="sc"><div class="sv r">'+wrong+'</div><div class="svl">答错</div></div>';
  h+='<div class="sc"><div class="sv b">'+fmt(sec)+'</div><div class="svl">用时</div></div></div>';

  // 模块明细
  h+='<div class="mod-title">📊 八大模块得分明细</div>';
  MOD_ORDER.forEach(m=>{
    let s=modStats[m]; if(!s||s.total===0) return;
    let pct=Math.round(s.right/s.total*100);
    let weak=pct<60?'weak':'';
    h+='<div class="mod-card '+weak+'">';
    h+='<div class="mh"><span class="mn">'+MOD_NAMES[m]+'</span><span class="ms">'+s.right+'/'+s.total+' · '+pct+'%</span></div>';
    h+='<div class="mbar"><div style="width:'+pct+'%"></div></div>';
    h+='</div>';
  });

  h+='<div style="margin:18px 0 16px">';
  h+='<button class="rbtn rreview" onclick="reviewExam()">📖 查看解析</button>';
  h+='<button class="rbtn rretry" onclick="retry()">🔄 重新考试</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function reviewExam(){
  review=true;filter='all';cur=0;
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  render();
}

function retry(){
  cur=0;ans={};sec=0;done=false;review=false;filter='all';
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p3').innerHTML='';
  document.getElementById('p1').classList.add('on');
  document.getElementById('pb').style.width='0%';
  document.getElementById('tl').textContent='100题 · 90分及格 · 满分100';
  document.getElementById('tr').textContent='00:00';
  clearInterval(timer);
}

function flt(f){
  filter=f;render();
}
</script>
</body>
</html>
