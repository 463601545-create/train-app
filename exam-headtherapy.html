{type:"single",m:"m1",q:"『护理后拍照』在流程中的核心价值是？",o:["巩固顾客好感打通转化链路","直观体现服务价值、加深顾客认可","沉淀私域客户实现复购转介绍","精准匹配护理项目"],a:1,e:"原文：护理后拍照——直观体现服务价值，加深顾客认可（前后对比拉开效果差距）。"},
{type:"single",m:"m1",q:"『沟通设计』环节在整体流程中的核心价值是？",o:["统一服务精气神","降低顾客陌生感","精准匹配护理项目，规避服务不符预期问题","沉淀私域客户"],a:2,e:"原文：沟通设计——精准匹配护理项目，规避服务不符预期问题（有效了解头皮头部需求、明确护理方向、树立专业形象、减少服务方向出错）。"},
{type:"judge",m:"m1",q:"『状态』被称为行动力量的源泉，作用是统一服务精气神、奠定整场服务舒适基调。",o:["正确","错误"],a:0,e:"原文：状态（行动力量的源泉）——统一服务精气神，奠定整场服务舒适基调。"},

// ===== M2 状态（4题：2单选+2判断） =====
{type:"single",m:"m2",q:"关于服务过程中的状态要求，下列描述完全正确的是？",o:["顾客没看时可短暂玩手机休息","主动积极、面带微笑、语调轻柔、肢体亲和、站姿坐姿端正","顾客没问就不主动说话","累了可以稍显敷衍"],a:1,e:"原文：全程保持主动积极、情绪愉悦、热情大方、面带微笑、语调轻柔、肢体亲和，站姿坐姿端正。"},

{type:"judge",m:"m2",q:"服务过程中允许在顾客不注意时低头玩手机短暂休息。",o:["正确","错误"],a:1,e:"原文明确：无不耐烦、敷衍、低头玩手机状态。"},
{type:"judge",m:"m2",q:"头疗师全程应保持情绪愉悦、热情大方、肢体亲和，并杜绝不耐烦与敷衍。",o:["正确","错误"],a:0,e:"原文状态准则：主动积极、情绪愉悦、热情大方、肢体亲和。"},

{type:"judge",m:"m3",q:"接待动作流程是：主动引导顾客到指定接待区→递茶水→安排舒适落座→对接专属头疗师。",o:["正确","错误"],a:0,e:"原文：动作流程——主动引导接待区、递茶水、安排舒适落座，及时对接专属头疗师。"},

// ===== M4 沟通设计（15题：9单选+6判断） =====
{type:"single",m:"m4",q:"门店沟通设计共分为几大类话术？",o:["1类","2类","3类","4类"],a:1,e:"原文：沟通设计（两类）——自主需求型、图片/项目指定型。"},

{type:"single",m:"m4",q:"八大需求询问中，A项主要询问的内容是？",o:["头皮困扰（头油头痒）","洗护频率与过敏","平时作息、工作压力、偏头痛、头晕、失眠多梦","力度偏好"],a:2,e:"原文A：平时作息、工作压力大吗？有没有偏头痛、头晕、失眠多梦？"},
{type:"single",m:"m4",q:"八大需求询问中，B项关注的核心是？",o:["头油、头痒、头屑、脱发、头皮紧绷、毛囊红肿等头皮困扰","顾客年龄","收入水平","项目偏好"],a:0,e:"原文B：日常头皮最困扰你的问题是什么？（头油、头痒、头屑、脱发、头皮紧绷、毛囊红肿）"},
{type:"single",m:"m4",q:"八大需求询问中，C项关注的核心内容是？",o:["作息压力情况","头皮困扰类型","平时洗头频率、自用洗护产品、头皮是否容易过敏","禁忌情况"],a:2,e:"原文C：平时洗头频率、自用洗护产品是什么？头皮是否容易过敏？"},
{type:"single",m:"m4",q:"八大需求询问中，F项关于禁忌的内容包括？",o:["是否喜欢温热热敷","护理力度偏好","是否有伤口、高血压、孕期、颈椎旧伤等禁忌","想做哪些部位"],a:2,e:"原文F：头部护理禁忌——是否有伤口、高血压、孕期、颈椎旧伤等禁忌？"},

{type:"single",m:"m4",q:"顾客自带项目图片/有固定喜好时，应先让顾客挑几个心仪项目结合体质适配？",o:["1个","2个","3个","5个"],a:2,e:"原文：让顾客先挑3个心仪项目，结合头皮检测+体质优化适配。"},
{type:"single",m:"m4",q:"服务预防针的核心作用是？",o:["推销高价项目","告知体感差异并约定全程可随时叫停，规避体验落差","加快服务流程","收集顾客投诉"],a:1,e:"原文预防针：每个人头皮屏障、体质耐受度、劳损程度不一样，同款项目体感和效果会差异化，全程不舒服随时叫停调整。"},
{type:"judge",m:"m4",q:"无论顾客是自主需求型还是图片指定型，打完预防针后都需沿用第一种问诊话术深挖细节需求。",o:["正确","错误"],a:0,e:"原文：打完预防针后，沿用第一种问诊话术深挖细节需求。"},

{type:"single",m:"m9",q:"门店头疗专属会员的最低开通门槛是？",o:["预存3次","预存5次","预存10次","预存20次"],a:1,e:"原文：门店只做适合的疗程储值，最低仅需预存5次即可开通头疗专属会员。"},
{type:"judge",m:"m9",q:"储值开卡套餐余量仅限本人使用，不可家人通用。",o:["正确","错误"],a:1,e:"原文：套餐余量全家人通用，长期做头皮养护、身体放松划算，消费透明无捆绑。"}
];

const MOD_NAMES={
  m1:"整体流程意义",
  m2:"状态",
  m3:"接待",
  m4:"沟通设计",
  m5:"护理前拍照",
  m6:"五步确认",
  m7:"满意度明确",
  m8:"微信添加",
  m9:"储值开卡"
};
const MOD_ORDER=["m1","m2","m3","m4","m5","m6","m7","m8","m9"];
const TYPE_NAMES={single:"单选",judge:"判断"};

let cur=0,ans={},timer,sec=0,done=false,review=false,filter='all';
const TOTAL=Q.length, PASS=90, PER=2;

function isCorrect(i){
  let q=Q[i],my=ans[i];
  if(my===undefined||my===null) return false;
  return my===q.a;
}

function go(){
  document.getElementById('p1').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  timer=setInterval(()=>{sec++;document.getElementById('tr').textContent=fmt(sec)},1000);
  render();
}

function fmt(s){
  let m=Math.floor(s/60),ss=s%60;
  return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}

function render(){
  let q=Q[cur], el=document.getElementById('p2');
  let my=ans[cur], answered=my!==undefined;
  let modName=MOD_NAMES[q.m]||q.m;
  let typeName=TYPE_NAMES[q.type]||q.type;
  let h='<div class="qc"><div class="num">第 <b>'+(cur+1)+'</b> / '+TOTAL+' 题</div>';
  h+='<span class="modtag">'+modName+'</span><span class="typetag">'+typeName+'</span>';
  h+='<div class="qt">'+q.q+'</div>';

  h+='<div class="opts">';
  let letters=q.type==='judge'?['✓','✗']:['A','B','C','D'];
  let optCount=q.o.length;
  for(let i=0;i<optCount;i++){
    let cls='ob';
    if(answered){
      cls+=' off';
      if(i===q.a) cls+=' ok';
      if(i===my&&my!==q.a) cls+=' no';
      if(!done&&i===q.a&&my!==q.a) cls+=' hi';
    }
    h+='<div class="'+cls+'" onclick="pick('+i+')"><div class="lt">'+letters[i]+'</div><div>'+q.o[i]+'</div></div>';
  }
  h+='</div>';
  if(answered){
    let mark=my===q.a?'回答正确！':'❌ 正确答案：'+letters[q.a]+'。';
    h+='<div class="exp on">💡 '+mark+q.e+'</div>';
  }
  h+='</div>';

  if(review&&done){
    let tags='<div class="rvtag"><button class="'+(filter==='all'?'on':'')+'" onclick="flt(\'all\')">全部</button>';
    tags+='<button class="'+(filter==='wrong'?'on':'')+'" onclick="flt(\'wrong\')">❌ 错题</button>';
    tags+='<button class="'+(filter==='right'?'on':'')+'" onclick="flt(\'right\')">✅ 对题</button></div>';
    h=tags+h;
  }

  el.innerHTML=h;

  document.getElementById('pb').style.width=((cur+1)/TOTAL*100)+'%';
  document.getElementById('tl').textContent=(cur+1)+'/'+TOTAL;

  let nb=document.getElementById('bNext');
  let pb=document.getElementById('bPrev');
  pb.style.display=cur>0?'block':'none';

  if(cur===TOTAL-1&&!done){
    nb.textContent='交卷';nb.className='bsub';nb.onclick=submit;
  }else if(done){
    nb.textContent=review?'返回成绩':'查看成绩';nb.className='bsub';nb.onclick=showResult;
  }else{
    nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)};
  }
  if(done&&cur<TOTAL-1){nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)}}
}

function pick(i){
  if(ans[cur]!==undefined)return;
  ans[cur]=i;
  done||setTimeout(()=>{if(cur<TOTAL-1)nav(1);else render()},600);
  render();
}

function nav(d){
  let nc=cur+d;
  if(nc<0||nc>TOTAL-1)return;
  if(review&&filter!=='all'){
    let dir=d>0?1:-1;
    let found=false;
    for(let j=nc;j>=0&&j<TOTAL;j+=dir){
      let isWrong=!isCorrect(j);
      if(filter==='wrong'&&isWrong){nc=j;found=true;break}
      if(filter==='right'&&!isWrong){nc=j;found=true;break}
    }
    if(!found)return;
  }
  cur=nc;render();
  window.scrollTo(0,0);
}

function submit(){
  done=true;review=false;
  clearInterval(timer);
  showResult();
}

function showResult(){
  document.getElementById('p2').classList.remove('on');
  document.getElementById('btm').style.display='none';
  document.getElementById('p3').classList.add('on');

  let right=0;
  for(let i=0;i<TOTAL;i++) if(isCorrect(i)) right++;
  let wrong=TOTAL-right;
  let score=right*PER;
  let pass=score>=PASS;

  // 模块得分统计
  let modStats={};
  MOD_ORDER.forEach(m=>{modStats[m]={total:0,right:0}});
  for(let i=0;i<TOTAL;i++){
    let m=Q[i].m;
    if(!modStats[m]) modStats[m]={total:0,right:0};
    modStats[m].total++;
    if(isCorrect(i)) modStats[m].right++;
  }

  // 分题型正确率
  let typeStats={single:{total:0,right:0},judge:{total:0,right:0}};
  for(let i=0;i<TOTAL;i++){
    let t=Q[i].type;
    if(!typeStats[t]) typeStats[t]={total:0,right:0};
    typeStats[t].total++;
    if(isCorrect(i)) typeStats[t].right++;
  }

  let el=document.getElementById('p3');
  let h='<div class="rp">';
  h+='<div class="circle '+(pass?'pass':'fail')+'"><div class="sn">'+score+'</div><div class="sl">分</div></div>';
  h+='<div class="rt">'+(pass?'🎉 恭喜通过':'💪 需要重考')+'</div>';
  h+='<div class="rs">'+(pass?'已达90分及格线，专业过硬':'距及格还差 '+(PASS-score)+' 分，请重新考试')+'</div>';
  h+='<div class="sg"><div class="sc"><div class="sv g">'+right+'</div><div class="svl">答对</div></div>';
  h+='<div class="sc"><div class="sv r">'+wrong+'</div><div class="svl">答错</div></div>';
  h+='<div class="sc"><div class="sv b">'+fmt(sec)+'</div><div class="svl">用时</div></div></div>';

  // 分题型正确率
  h+='<div class="mod-title">📝 分题型正确率</div>';
  h+='<div class="tg">';
  ['single','judge'].forEach(t=>{
    let s=typeStats[t];
    let pct=s.total?Math.round(s.right/s.total*100):0;
    h+='<div class="tc"><div class="tn">'+TYPE_NAMES[t]+'</div><div class="tv">'+s.right+'/'+s.total+'</div><div class="tr">'+pct+'%</div></div>';
  });
  h+='</div>';

  // 模块明细
  h+='<div class="mod-title">📊 九大模块得分明细</div>';
  MOD_ORDER.forEach(m=>{
    let s=modStats[m]; if(!s||s.total===0) return;
    let pct=Math.round(s.right/s.total*100);
    let weak=pct<60?'weak':'';
    h+='<div class="mod-card '+weak+'">';
    h+='<div class="mh"><span class="mn">'+MOD_NAMES[m]+'</span><span class="ms">'+s.right+'/'+s.total+' · '+pct+'%</span></div>';
    h+='<div class="mbar"><div style="width:'+pct+'%"></div></div>';
    h+='</div>';
  });

  h+='<div style="margin:18px 0 16px">';
  h+='<button class="rbtn rreview" onclick="reviewExam()">📖 查看解析</button>';
  h+='<button class="rbtn rretry" onclick="retry()">🔄 重新考试</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function reviewExam(){
  review=true;filter='all';cur=0;
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  render();
}

function retry(){
  cur=0;ans={};sec=0;done=false;review=false;filter='all';
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p3').innerHTML='';
  document.getElementById('p1').classList.add('on');
  document.getElementById('pb').style.width='0%';
  document.getElementById('tl').textContent='50题 · 90分及格 · 满分100';
  document.getElementById('tr').textContent='00:00';
  clearInterval(timer);
}

function flt(f){
  filter=f;render();
}
</script>
</body>
