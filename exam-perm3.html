<style>

.rp .sc .sv{font-size:22px;font-weight:800}

.mod-card .mh{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:6px}
.mod-card .mh .mn{color:#333}

.mod-card.weak .mh .ms{color:#dc2626}
.rbtn{display:inline-block;padding:13px 36px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin:4px}
.rreview{background:#f3f4f6;color:#333}
.rretry{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.rvtag{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0;margin-bottom:6px}
.rvtag button{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#666}
.rvtag button.on{background:#047857;color:#fff;border-color:#047857}
</style>

<script>
const Q=[
// ===== 模块1 双维诊断（干检+湿检） 10题 =====
{type:"single",m:"M1",q:"门店发质判断的根本原则是？",o:["凭肉眼目测经验判断","只看顾客描述过往烫染史","杜绝肉眼目测，干检+湿检双维度检测","只做湿检足够"],a:2,e:"原文：所有发质判断，杜绝肉眼目测，必须双维度检测（干检+湿检）。"},
{type:"single",m:"M1",q:"干发拉伸测试应取多少根发丝进行轻柔拉伸？",o:["5根","10根","20根","50根"],a:2,e:"原文：干发拉伸测试取20根发丝轻柔拉伸。"},
{type:"single",m:"M1",q:"健康发在干发拉伸测试中的表现是？",o:["拉伸1.1倍柔和回弹","拉伸1.2倍，回弹有力不断","拉伸1.5倍不断","绵软无回弹"],a:1,e:"原文：健康发拉伸1.2倍，回弹有力不断。"},
{type:"single",m:"M1",q:"轻损发干发拉伸测试的典型表现是？",o:["拉伸1.2倍有力回弹","拉伸1.1倍，回弹柔和","完全无回弹","一拉即断"],a:1,e:"原文：轻损发拉伸1.1倍，回弹柔和。"},
{type:"single",m:"M1",q:"中重损发拉伸测试的典型表现是？",o:["拉伸1.2倍有力回弹","拉伸1.1倍柔和回弹","绵软无力、无回弹、易断","拉伸1.5倍不断"],a:2,e:"原文：中重损发绵软无力、无回弹、易断。"},
{type:"single",m:"M1",q:"湿发渗透复核的正确操作方式是？",o:["干发直接目测","喷水打湿观察吸水表现","涂药水后观察","拉伸2倍观察"],a:1,e:"原文：湿发渗透复核——喷水打湿观察。"},
{type:"single",m:"M1",q:"抗拒发在湿检中的典型表现是？",o:["吸水均匀发丝柔韧","吸水慢、挂水珠、难渗透","极速吸水、发丝塌陷","拉伸即断"],a:1,e:"原文：抗拒发吸水慢、挂水珠、难渗透。"},
{type:"single",m:"M1",q:"健康发在湿检中的典型表现是？",o:["挂水珠不吸水","极速吸水塌陷","吸水均匀、发丝柔韧","完全不吸水"],a:2,e:"原文：健康发吸水均匀、发丝柔韧。"},
{type:"single",m:"M1",q:"受损发在湿检中的典型表现是？",o:["挂水珠、难渗透","吸水均匀柔韧","极速吸水、发丝塌陷绵软","完全不变化"],a:2,e:"原文：受损发极速吸水、发丝塌陷绵软。"},
{type:"single",m:"M1",q:"双维诊断的结论主要用来决定？",o:["只决定收费定档","先判结构，再定药水、定时长、定温度","只决定卷杠大小","只决定定型时长"],a:1,e:"原文：先判结构，再定药水、定时长、定温度。"},

// ===== 模块2 药水纯水配比 5题 =====
{type:"single",m:"M2",q:"软化全程只允许添加什么来调节药性强度？",o:["蛋白护理原液","清水/纯水","修复精华","酸性护发素"],a:1,e:"原文：软化全程零护理添加，只靠清水调节药性强度。"},
{type:"single",m:"M2",q:"软化过程中严禁添加下列哪一类产品？",o:["清水","纯净水","任何护理、蛋白、修复类产品","空气"],a:2,e:"原文：软化全程零护理添加，只靠清水调节药性强度。"},
{type:"single",m:"M2",q:"门店药水配比的执行方式是？",o:["凭手感调节","严格按照理论标准执行","顾客要求就调","时间越长越浓"],a:1,e:"原文：严格按照理论标准执行，软化全程零护理添加。"},
{type:"single",m:"M2",q:"药水稀释适配的核心依据是？",o:["顾客年龄","头发长度","不同受损程度","发色深浅"],a:2,e:"原文：适配不同受损程度。"},
{type:"single",m:"M2",q:"软化零护理添加的核心目的是？",o:["让顾客省钱","保证药水真实渗透，避免成膜阻隔","加快操作速度","让药水更浓"],a:1,e:"原文：软化只靠清水调节药性强度，避免护理成分形成膜阻隔药水。"},

// ===== 模块3 湿发软化涂抹 12题 =====
{type:"single",m:"M3",q:"软化前头发的正确前置状态是？",o:["完全干发","半湿半干","全头湿透、按压控水、不滴水、高含水状态","只喷水局部"],a:2,e:"原文：软化前全头湿透、按压控水、不滴水、高含水状态。"},
{type:"single",m:"M3",q:"全头湿透后上药前应该如何处理？",o:["直接上药","用毛巾按压控水至不滴水","完全吹干再上药","揉搓拧干"],a:1,e:"原文：全头湿透、按压控水、不滴水，高含水状态。"},
{type:"single",m:"M3",q:"单片药水涂抹的标准厚度是？",o:["0.3cm","0.5cm","0.8cm","1.5cm"],a:2,e:"原文：单片厚度0.8cm，薄涂均匀不堆积不漏涂。"},
{type:"single",m:"M3",q:"药水涂抹的正确原则是？",o:["厚涂堆积保安全","薄涂、均匀、不堆积、不漏涂","越厚越好","集中涂抹发根"],a:1,e:"原文：单片厚度0.8cm，薄涂、均匀、不堆积、不漏涂。"},
{type:"single",m:"M3",q:"药水厚涂堆积会导致的直接后果是？",o:["卷度更持久","局部药性超标=烧发、棉化","药水更省","反应更均匀"],a:1,e:"原文：厚药堆积=局部药性超标=烧发、棉化。"},
{type:"single",m:"M3",q:"抗拒粗硬发的软化涂抹正确顺序是？",o:["先发根→再发尾→最后中段","先发中主干→8分钟补发根→最后轻带发尾","全头一次性厚涂","只涂发根"],a:1,e:"原文：抗拒粗硬发先发中主干→8分钟补发根→最后轻带发尾。"},
{type:"single",m:"M3",q:"抗拒粗硬发发中涂完后，发根补涂的正确时间点是？",o:["立即","3分钟后","8分钟后","15分钟后"],a:2,e:"原文：抗拒粗硬发先发中→8分钟后补发根。"},
{type:"single",m:"M3",q:"健康发软化时发根应预留多少不涂药？",o:["0.5cm","1cm","1.5cm","2cm"],a:1,e:"原文：健康发预留1cm发根，只涂发干，保护发根支撑力。"},
{type:"single",m:"M3",q:"健康发软化涂抹的核心原则是？",o:["发根重点涂","预留1cm发根、只涂发干，保护发根支撑力","全头厚涂包裹","只涂发尾"],a:1,e:"原文：健康发预留1cm发根，只涂发干，保护发根支撑力。"},
{type:"single",m:"M3",q:"受损发软化涂抹时发根应预留多少？",o:["0.5cm","1cm","1.5cm","3cm"],a:2,e:"原文：受损发先涂健康段、预留1.5cm发根、最后5分钟补发尾。"},
{type:"single",m:"M3",q:"受损发发尾正确的补涂时间点是？",o:["一开始就涂满","中段补涂","最后5分钟补发尾","冲水前立即补"],a:2,e:"原文：受损发最后5分钟补发尾。"},
{type:"single",m:"M3",q:"软化过程中若发丝出现发干，正确的处理是？",o:["继续等待反应完成","立刻喷水补湿","立即冲水中止","加大药水量"],a:1,e:"原文：软化过程一旦发丝发干，立刻喷水补湿。软化脱水=蛋白流失。"},

// ===== 模块4 软化监测与冲净 11题 =====
{type:"single",m:"M4",q:"软化脱水会导致什么不可逆后果，是所有烫后不亮/不柔/毛躁的根源？",o:["卷度更持久","蛋白流失=永久性干枯无质感","光泽增强","发丝更粗硬"],a:1,e:"原文：软化脱水=蛋白流失=永久性干枯无质感。所有烫后不亮/不柔/毛躁大部分源于软化脱水。"},
{type:"single",m:"M4",q:"软化监测的观察频率是？",o:["每5分钟","每3分钟","每10分钟","全程不用观察"],a:1,e:"原文：全程人不离岗，每3分钟观察一次软化进度。"},
{type:"single",m:"M4",q:"健康粗硬发软化达标的双重测试标准是？",o:["只绕指1圈","绕指两圈自然S回弹、拉伸1.2倍不断","拉伸2倍不断","只做目测"],a:1,e:"原文：健康粗硬绕指两圈自然S回弹、拉伸1.2倍不断。"},
{type:"single",m:"M4",q:"轻损发质软化达标的测试标准是？",o:["绕指1圈+拉伸2倍","柔和回弹+拉伸1.1倍","绵软无回弹","拉伸1.5倍"],a:1,e:"原文：轻损发柔和回弹、拉伸1.1倍。"},
{type:"single",m:"M4",q:"中重损发质软化监测的核心禁忌是？",o:["允许拉伸2倍","只做绕指测试，禁止拉伸避免断发","可以拉伸1.2倍","只用目测"],a:1,e:"原文：中重损只做绕指测试，禁止拉伸，避免断发。"},
{type:"single",m:"M4",q:"软化操作的核心操作准则是？",o:["越透越好","宁欠勿过，留弹性、不留损伤","宁过勿欠","严格达到药水说明书时长"],a:1,e:"原文：宁欠勿过，留弹性、不留损伤。"},
{type:"single",m:"M4",q:"软化达标后正确的下一步动作是？",o:["静置10分钟继续反应","立刻冲水，禁止带药搁置氧化","继续闷蒸5分钟","直接卷杠"],a:1,e:"原文：软化达标立刻冲水，禁止带药搁置氧化。"},
{type:"single",m:"M4",q:"冲净时的水温应恒定在？",o:["25-30℃","30-35℃","35-38℃","40-45℃"],a:2,e:"原文：水温恒定35–38℃。"},
{type:"single",m:"M4",q:"冲净的正确方向是？",o:["逆毛鳞片自下而上","顺毛鳞片自上而下","左右横向搓洗","无固定方向"],a:1,e:"原文：顺毛鳞片自上而下冲洗。"},
{type:"single",m:"M4",q:"健康发的冲洗时长要求是？",o:["≥1分钟","≥3分钟","≥5分钟","≥10分钟"],a:1,e:"原文：健康发冲洗≥3分钟。"},

{type:"single",m:"M12",q:"顾客反馈「发根塌陷」最典型的错误溯源是？",o:["精油涂发根","平圈圈数过多、角度过低、发根预留不足","药水稀释过度","定型剂过多"],a:1,e:"原文5大问题溯源3：发根塌陷=平圈圈数过多+角度过低+发根预留不足。"},
{type:"single",m:"M12",q:"顾客反馈「发尾炸裂」最典型的错误溯源是？",o:["精油涂太多","小杠平卷、发尾张力过大、发尾浸泡超时","定型时长不足","冷却时长不足"],a:1,e:"原文5大问题溯源4：发尾炸裂=小杠平卷+发尾张力过大+发尾浸泡超时。"}
];

const MOD_NAMES={
  M1:"双维诊断",
  M2:"药水纯水配比",
  M3:"湿发软化涂抹",
  M4:"软化监测与冲净",
  M5:"卷杠选型底层逻辑",
  M6:"五大卷杠手法",
  M7:"上杠控水",
  M8:"加热逻辑",
  M9:"冷却与拆杠",
  M10:"定型标准",
  M11:"吹造型",
  M12:"雷区总结与红线"
};
const MOD_ORDER=["M1","M2","M3","M4","M5","M6","M7","M8","M9","M10","M11","M12"];

let cur=0,ans={},timer,sec=0,done=false,review=false,filter='all';
const TOTAL=Q.length, PASS=60;

function go(){
  document.getElementById('p1').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  timer=setInterval(()=>{sec++;document.getElementById('tr').textContent=fmt(sec)},1000);
  render();
}

function fmt(s){
  let m=Math.floor(s/60),ss=s%60;
  return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}

function render(){
  let q=Q[cur], el=document.getElementById('p2');
  let my=ans[cur], answered=my!==undefined;
  let modName=MOD_NAMES[q.m]||q.m;
  let h='<div class="qc"><div class="num">第 <b>'+(cur+1)+'</b> / '+TOTAL+' 题</div>';
  h+='<div class="modtag">'+modName+'</div>';
  h+='<div class="qt">'+q.q+'</div><div class="opts">';
  let letters=['A','B','C','D'];
  for(let i=0;i<4;i++){
    let cls='ob';
    if(answered){
      cls+=' off';
      if(i===q.a) cls+=' ok';
      if(i===my&&my!==q.a) cls+=' no';
      if(!done&&i===q.a&&my!==q.a) cls+=' hi';
    }
    h+='<div class="'+cls+'" onclick="pick('+i+')"><div class="lt">'+letters[i]+'</div><div>'+q.o[i]+'</div></div>';
  }
  h+='</div>';
  if(answered){
    h+='<div class="exp on">💡 '+(my===q.a?'回答正确！':'❌ 正确答案：'+letters[q.a]+'。')+q.e+'</div>';
  }else{
    h+='<div class="exp"></div>';
  }
  h+='</div>';

  if(review&&done){
    let tags='<div class="rvtag"><button class="'+(filter==='all'?'on':'')+'" onclick="flt(\'all\')">全部</button>';
    tags+='<button class="'+(filter==='wrong'?'on':'')+'" onclick="flt(\'wrong\')">❌ 错题</button>';
    tags+='<button class="'+(filter==='right'?'on':'')+'" onclick="flt(\'right\')">✅ 对题</button></div>';
    h=tags+h;
  }

  el.innerHTML=h;

  document.getElementById('pb').style.width=((cur+1)/TOTAL*100)+'%';
  document.getElementById('tl').textContent=(cur+1)+'/'+TOTAL;

  let nb=document.getElementById('bNext');
  let pb=document.getElementById('bPrev');
  pb.style.display=cur>0?'block':'none';

  if(cur===TOTAL-1&&!done){
    nb.textContent='交卷';nb.className='bsub';nb.onclick=submit;
  }else if(done){
    nb.textContent=review?'返回成绩':'查看成绩';nb.className='bsub';nb.onclick=showResult;
  }else{
    nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)};
  }
  if(done&&cur<TOTAL-1){nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)}}
}

function pick(i){
  if(ans[cur]!==undefined)return;
  ans[cur]=i;
  done||setTimeout(()=>{if(cur<TOTAL-1)nav(1);else render()},600);
  render();
}

function nav(d){
  let nc=cur+d;
  if(nc<0||nc>TOTAL-1)return;
  if(review&&filter!=='all'){
    let dir=d>0?1:-1;
    let found=false;
    for(let j=nc;j>=0&&j<TOTAL;j+=dir){
      let isWrong=ans[j]!==Q[j].a;
      if(filter==='wrong'&&isWrong){nc=j;found=true;break}
      if(filter==='right'&&!isWrong){nc=j;found=true;break}
    }
    if(!found)return;
  }
  cur=nc;render();
  window.scrollTo(0,0);
}

function submit(){
  done=true;review=false;
  clearInterval(timer);
  showResult();
}

function showResult(){
  document.getElementById('p2').classList.remove('on');
  document.getElementById('btm').style.display='none';
  document.getElementById('p3').classList.add('on');

  let right=0;
  for(let i=0;i<TOTAL;i++) if(ans[i]===Q[i].a) right++;
  let wrong=TOTAL-right;
  let score=right;
  let pass=score>=PASS;

  let modStats={};
  MOD_ORDER.forEach(m=>{modStats[m]={total:0,right:0}});
  for(let i=0;i<TOTAL;i++){
    let m=Q[i].m;
    if(!modStats[m]) modStats[m]={total:0,right:0};
    modStats[m].total++;
    if(ans[i]===Q[i].a) modStats[m].right++;
  }

  let el=document.getElementById('p3');
  let h='<div class="rp">';
  h+='<div class="circle '+(pass?'pass':'fail')+'"><div class="sn">'+score+'</div><div class="sl">分</div></div>';
  h+='<div class="rt">'+(pass?'🎉 恭喜通过':'💪 需要重考')+'</div>';
  h+='<div class="rs">'+(pass?'60分及格线，你已达标':'距及格还差'+(PASS-score)+'分，请重新考试')+'</div>';
  h+='<div class="sg"><div class="sc"><div class="sv g">'+right+'</div><div class="svl">答对</div></div>';
  h+='<div class="sc"><div class="sv r">'+wrong+'</div><div class="svl">答错</div></div>';
  h+='<div class="sc"><div class="sv b">'+fmt(sec)+'</div><div class="svl">用时</div></div></div>';

  h+='<div class="mod-title">📊 十二大模块得分明细</div>';
  MOD_ORDER.forEach(m=>{
    let s=modStats[m]; if(!s||s.total===0) return;
    let pct=Math.round(s.right/s.total*100);
    let weak=pct<60?'weak':'';
    h+='<div class="mod-card '+weak+'">';
    h+='<div class="mh"><span class="mn">'+MOD_NAMES[m]+'</span><span class="ms">'+s.right+'/'+s.total+' · '+pct+'%</span></div>';
    h+='<div class="mbar"><div style="width:'+pct+'%"></div></div>';
    h+='</div>';
  });

  h+='<div style="margin:18px 0 16px">';
  h+='<button class="rbtn rreview" onclick="reviewExam()">📖 查看解析</button>';
  h+='<button class="rbtn rretry" onclick="retry()">🔄 重新考试</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function reviewExam(){
  review=true;filter='all';cur=0;
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  render();
}

function retry(){
  cur=0;ans={};sec=0;done=false;review=false;filter='all';
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p3').innerHTML='';
  document.getElementById('p1').classList.add('on');
  document.getElementById('pb').style.width='0%';
  document.getElementById('tl').textContent='100题 · 60分及格 · 满分100';
  document.getElementById('tr').textContent='00:00';
  clearInterval(timer);
}

function flt(f){
  filter=f;render();
}
</script>
</body>
</html>
