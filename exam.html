<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>热烫内训考试·100题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f0f2f5;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(185,28,28,.3)}
.topbar h1{font-size:18px;font-weight:800}
.topbar .sub{font-size:12px;opacity:.85;margin-top:4px}
.progress-wrap{margin-top:10px;height:6px;background:rgba(255,255,255,.25);border-radius:3px}
.progress-bar{height:100%;background:#fff;border-radius:3px;transition:width .3s}
.container{max-width:640px;margin:0 auto;padding:12px 12px 100px}
/* Start Screen */
.start-screen{text-align:center;padding:40px 20px}
.start-screen .icon{font-size:72px;margin-bottom:16px}
.start-screen h2{font-size:22px;font-weight:800;color:#b91c1c;margin-bottom:8px}
.start-screen p{font-size:14px;color:#666;line-height:1.8;margin-bottom:24px}
.start-screen .info{background:#fff;border-radius:12px;padding:20px;margin-bottom:24px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.start-screen .info div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.start-screen .info div:last-child{border:none}
.start-screen .info span:last-child{font-weight:700;color:#b91c1c}
.start-btn{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff;border:none;padding:14px 48px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(185,28,28,.3)}
.start-btn:active{transform:scale(.97)}
/* Exam Screen */
.q-card{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.q-num{font-size:12px;color:#999;margin-bottom:6px}
.q-num b{color:#b91c1c;font-size:14px}
.q-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;margin-bottom:8px}
.q-tag.t1{background:#b91c1c}.q-tag.t2{background:#ea580c}.q-tag.t3{background:#7c3aed}.q-tag.t4{background:#0891b2}.q-tag.t5{background:#16a34a}
.q-text{font-size:15px;font-weight:600;line-height:1.6;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;line-height:1.5;cursor:pointer;transition:all .15s}
.opt:active{transform:scale(.98)}
.opt.selected{border-color:#b91c1c;background:#fef2f2;color:#b91c1c;font-weight:600}
.opt.correct{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.opt.wrong{border-color:#dc2626;background:#fef2f2;color:#dc2626;font-weight:600}
.opt.show-correct{border-color:#16a34a;background:#f0fdf4;color:#16a34a}
.q-result{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.q-result.show{display:block}
.q-result.right{background:#f0fdf4;color:#16a34a}
.q-result.wrong-r{background:#fef2f2;color:#dc2626}
/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:10px 20px;z-index:100}
.bottom-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.bbtn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.bbtn-prev{background:#f0f0f0;color:#666}
.bbtn-next{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff}
.bbtn-submit{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.bbtn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:13px;color:#888;font-weight:600}
/* Result Screen */
.result-screen{text-align:center;padding:30px 20px}
.result-screen .icon{font-size:72px;margin-bottom:12px}
.result-screen h2{font-size:24px;font-weight:800;margin-bottom:6px}
.result-screen .score{font-size:48px;font-weight:900;color:#b91c1c;margin:12px 0}
.result-screen .score span{font-size:20px;color:#999}
.result-screen .rank{font-size:16px;font-weight:700;padding:6px 20px;border-radius:20px;display:inline-block;margin-bottom:20px}
.rank.s{background:#fef3c7;color:#92400e}.rank.a{background:#dcfce7;color:#16a34a}.rank.b{background:#dbeafe;color:#2563eb}.rank.c{background:#f0f0f0;color:#666}
.stats{background:#fff;border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stats div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.stats div:last-child{border:none}
.stats b{color:#b91c1c}
.rbtn{padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin:4px}
.rbtn-review{background:#f0f0f0;color:#333}
.rbtn-retry{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff}
/* Review */
.review-bar{position:sticky;top:0;background:#fff;z-index:99;padding:10px 20px;box-shadow:0 2px 4px rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between}
.review-bar span{font-size:14px;font-weight:700;color:#b91c1c}
.review-filter{display:flex;gap:6px;flex-wrap:wrap;padding:12px;margin-bottom:8px}
.rfbtn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#666}
.rfbtn.active{background:#b91c1c;color:#fff;border-color:#b91c1c}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <h1>🔥 热烫内训考试</h1>
  <div class="sub" id="topbarSub">3小时高阶热烫全科系统内训</div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<!-- Start Screen -->
<div id="startScreen" class="container">
  <div class="start-screen">
    <div class="icon">🔥</div>
    <h2>热烫内训考试</h2>
    <p>3小时高阶热烫全科系统内训<br>基于课程全部知识点出题</p>
    <div class="info">
      <div><span>题目数量</span><span>100题</span></div>
      <div><span>题型</span><span>单选 + 判断</span></div>
      <div><span>总分</span><span>100分</span></div>
      <div><span>及格线</span><span>80分</span></div>
      <div><span>答题时间</span><span>不限时</span></div>
    </div>
    <button class="start-btn" onclick="startExam()">开始考试</button>
  </div>
</div>

<!-- Exam Screen -->
<div id="examScreen" class="container" style="display:none"></div>

<!-- Result Screen -->
<div id="resultScreen" class="container" style="display:none"></div>

<div class="bottom-bar" id="bottomBar" style="display:none">
  <div class="bottom-inner">
    <button class="bbtn bbtn-prev" id="btnPrev" onclick="prevQ()">上一题</button>
    <span class="page-info" id="pageInfo">1/100</span>
    <button class="bbtn bbtn-next" id="btnNext" onclick="nextQ()">下一题</button>
  </div>
</div>

<script>
var QS = [
// ===== 第一章 毛发结构 =====
{t:"单选",q:"头发是没有生命的什么组织？",o:["活细胞组织","死细胞组织","半活性组织","可再生组织"],a:1,c:"头发是没有生命的死细胞组织，没有代谢、没有修复、没有再生。"},
{t:"单选",q:"头发表皮层（毛小皮）的鳞片重叠层数约为？",o:["1-3层","3-5层","6-10层","12-15层"],a:2,c:"毛小皮为鱼鳞状、瓦片式重叠排列，6-10层结构。"},
{t:"单选",q:"毛小皮（表皮层）主要决定头发的什么？",o:["卷度与弹性","光泽、顺滑、锁水性","颜色深浅","粗细程度"],a:1,c:"毛小皮决定光泽、顺滑、锁水性、质感细腻度。"},
{t:"判断",q:"护发素、精油、发膜可以修复皮质层内部受损结构。",o:["正确","错误"],a:1,c:"所有护发素、精油、发膜只作用于表皮层，只能闭合鳞片、填补表层缝隙，无法修复内部受损结构。护发是修饰，烫染是改芯。"},
{t:"单选",q:"占头发体积75%-90%的是哪一层？",o:["毛小皮","皮质层","髓质层","表皮层"],a:1,c:"皮质层占头发体积75%-90%，是技术核心层。"},
{t:"单选",q:"头发的弹性、韧性、颜色、卷度记忆集中在哪里？",o:["毛小皮","皮质层","髓质层","表皮层"],a:1,c:"所有弹性、韧性、颜色、卷度记忆、链键系统，全部集中在皮质层。"},
{t:"判断",q:"髓质层参与烫染的化学反应。",o:["正确","错误"],a:1,c:"髓质层不参与任何烫染化学反应，对烫发无任何影响。"},
{t:"单选",q:"细软发质、浅色发质、受损发质的髓质层特点是什么？",o:["髓质层特别厚","大多无完整髓质","髓质层参与烫染反应","髓质层决定卷度"],a:1,c:"细软发质、浅色发质、受损发质大多无完整髓质。"},

// ===== 第二章 四大链键 =====
{t:"单选",q:"头发内部最强、最稳定的结构性键位是？",o:["氢键","盐键","二硫键","肽键"],a:2,c:"二硫键是头发内部最强、最稳定的结构性键位，决定天生直/卷和永久形态。"},
{t:"单选",q:"烫发永久卷度记忆靠的是哪个键的重组？",o:["氢键","盐键","二硫键","肽键"],a:2,c:"二硫键重组＝永久卷度记忆，水洗不掉、吹风不变。"},
{t:"单选",q:"头发烫完很快变直的根本原因是什么？",o:["杠子选错","二硫键断裂不足、重组不彻底","氢键没定型","盐键流失"],a:1,c:"烫完很快变直不是杠子问题，是二硫键断裂不足、重组不彻底。"},
{t:"单选",q:"数量最多、最弱、最活跃的键是？",o:["二硫键","氢键","盐键","肽键"],a:1,c:"氢键数量最多、最弱、最活跃，遇水遇热自动断裂重组，完全可逆。"},
{t:"单选",q:"吹风造型、电棒造型改变的是哪个键？",o:["二硫键","氢键","盐键","肽键"],a:1,c:"吹风造型、电棒造型全部只改变氢键，所以洗头即恢复。"},
{t:"单选",q:"氢烫的核心原理是什么？",o:["大量断裂二硫键","几乎不动二硫键，只调整氢键形态","只改变盐键","只重组肽键"],a:1,c:"氢烫几乎不动二硫键，只调整氢键形态，所以发质极致健康、卷度柔软、但持久度偏弱。"},
{t:"单选",q:"受PH酸碱度控制的键是？",o:["二硫键","氢键","盐键","肽键"],a:2,c:"盐键受PH酸碱度控制，决定头发支撑力、弹性、紧实度。"},
{t:"单选",q:"碱性过强会导致哪个键流失，使头发软塌无弹力？",o:["二硫键","氢键","盐键","肽键"],a:2,c:"碱性过强会流失盐键，头发烫完软塌、无弹力、蓬松度差。"},
{t:"单选",q:"头发蛋白质的主干骨架键是？",o:["二硫键","氢键","盐键","肽键"],a:3,c:"肽键是头发蛋白质的主干骨架键，极强、极稳定。"},
{t:"判断",q:"正常烫发会破坏肽键。",o:["正确","错误"],a:1,c:"正常烫发不会破坏肽键。一旦肽键断裂等于头发碳化、棉化、粉碎性损伤，彻底不可逆。"},
{t:"单选",q:"头发碳化、棉化、粉碎性损伤说明哪个键被破坏了？",o:["二硫键","氢键","盐键","肽键"],a:3,c:"所有烫断、烫废的头发，全部是强碱、高温、过度软化破坏了肽键。"},

// ===== 第三章 烫发三步化学原理 =====
{t:"单选",q:"烫发第一步还原软化的作用是？",o:["闭合毛鳞片","打开毛鳞片，断裂部分二硫键，获得可塑性","重新组合二硫键","定型卷度"],a:1,c:"碱性药水打开毛鳞片，进入皮质层，断裂部分二硫键，让头发获得可塑性。"},
{t:"判断",q:"软化过程中可以加入护理或蛋白类产品保护头发。",o:["正确","错误"],a:1,c:"软化全程禁止加入任何护理、蛋白、修复类产品，因为护理成分会成膜包裹、阻隔药水渗透，导致假性软化。"},
{t:"单选",q:"软化时加入护理产品会导致什么后果？",o:["软化更快更均匀","假性软化、外软内硬、烫后反弹","保护发质不受损","卷度更持久"],a:1,c:"护理成分会包裹毛鳞片、阻隔药水渗透，最终导致假性软化、外软内硬、烫后反弹、卷度不持久。"},
{t:"单选",q:"烫发第二步物理塑形的作用是？",o:["断裂二硫键","通过卷杠改变发丝空间曲线，为二硫键重组做精准定位","闭合毛鳞片","氧化定型"],a:1,c:"物理塑形通过卷杠缠绕改变发丝空间曲线，固定新的形态位置，为二硫键重组做精准定位。"},
{t:"单选",q:"烫发第三步氧化定型的原理是？",o:["断裂更多二硫键","定型剂中和碱性、闭合毛鳞片，重新对接二硫键","只改变氢键","只改变盐键"],a:1,c:"定型剂中和碱性、闭合毛鳞片，重新对接二硫键，永久锁定卷度形态。"},
{t:"判断",q:"软化只能用清水稀释浓度，这是门店红线标准。",o:["正确","错误"],a:0,c:"软化必须湿发操作，软化只能用清水稀释浓度，这是门店终身不变的红线标准。"},
{t:"判断",q:"软化必须湿发操作。",o:["正确","错误"],a:0,c:"软化必须湿发操作，这是门店和市面上所有普通烫法最大的区别。"},

// ===== 第四章 四大烫型体系 =====
{t:"单选",q:"冷烫的特点是什么？",o:["常温反应、湿卷干塌、主打纹理蓬松","化学加热力双重记忆、干湿双弹","高温重置纤维结构、永久拉直","氢键塑形、零损伤"],a:0,c:"冷烫：常温反应、湿卷干塌、主打纹理蓬松。"},
{t:"单选",q:"热烫的核心优势是什么？",o:["零损伤","化学加热力双重记忆、干湿双弹","只改变氢键","常温操作"],a:1,c:"热烫：化学加热力双重记忆、干湿双弹，本店主打高端质感。"},
{t:"单选",q:"离子烫的原理是什么？",o:["常温反应","化学加热力双重记忆","高温重置纤维结构、永久拉直","氢键塑形"],a:2,c:"离子烫：高温重置纤维结构、永久拉直。"},
{t:"单选",q:"氢烫的特点是什么？",o:["常温反应","高温重置","氢键塑形、零损伤、微卷轻质感","干湿双弹"],a:2,c:"氢烫：氢键塑形、零损伤、微卷轻质感。"},

// ===== 第五章 药水配比 =====
{t:"单选",q:"粗硬抗拒发的药水配比是？",o:["10:3","10:5","原液操作","10:10"],a:2,c:"粗硬抗拒发：原液操作。"},
{t:"单选",q:"健康原发的稀释比例是？",o:["原液","10:1～10:3","10:3～10:5","10:5～10:10"],a:1,c:"健康原发：10:1～10:3。"},
{t:"单选",q:"1-2度轻度受损的稀释比例是？",o:["原液","10:1～10:3","10:3～10:5","10:5～10:10"],a:2,c:"1-2度轻损：10:3～10:5。"},
{t:"单选",q:"3-4度中度受损的稀释比例是？",o:["10:1～10:3","10:3～10:5","10:5～10:10","10:10～10:1000"],a:2,c:"3-4度中损：10:5～10:10。"},
{t:"单选",q:"5-7度重度漂损的稀释比例是？",o:["10:3～10:5","10:5～10:10","10:10～10:1000","原液"],a:2,c:"5-7度重度漂损：10:10～10:1000。"},

// ===== 沙性发质破冰处理 =====
{t:"单选",q:"沙性自然卷发质破冰处理使用的稀释比例是？",o:["原液","10:3","10:5","10:10"],a:3,c:"沙性操作第一步：使用10:10超轻稀释药水，整体快速梳理破冰。"},
{t:"单选",q:"沙性发质破冰处理的主要目的是什么？",o:["快速软化头发","打开毛鳞片、统一发丝结构、提前锁水、防止蛋白流失","只为了上色","增加头发硬度"],a:1,c:"破冰的目的不是软化，是打开毛鳞片统一结构、提前锁水、防止蛋白流失。"},
{t:"判断",q:"沙性发质可以直接上浓药水软化。",o:["正确","错误"],a:1,c:"沙性发质不能直接上浓药，必须先破冰锁水，否则发丝快速脱水、蛋白流失、结构崩塌。"},
{t:"判断",q:"沙性发质软化过程中，一旦出现泛黄、发干，应立刻喷水保湿。",o:["正确","错误"],a:0,c:"全程随时观察发色变化，一旦出现泛黄、发干，立刻喷水保湿，杜绝脱水损伤。"},
{t:"判断",q:"沙性发质的刘海、面部侧区极度细软发质，可以和头顶使用相同浓度软化。",o:["正确","错误"],a:1,c:"刘海、面部侧区极度细软发质，必须单独调低浓度，预防软化过度。"},

// ===== 第一步 发质诊断 =====

  var h='<div class="q-card">';
  h+='<div class="q-num">第 <b>'+(curQ+1)+'</b> 题 / 共 '+QS.length+' 题</div>';
  var tagCls={'毛发结构':'t1','链键系统':'t1','化学原理':'t2','烫型体系':'t2','药水配比':'t3','沙性发质':'t3','发质诊断':'t4','软化操作':'t4','软化监测':'t4','冲洗':'t4','卷杠':'t5','加热':'t5','定型':'t5','养护':'t5','造型':'t5','翻车分析':'t2','铁律':'t1','综合':'t3'};
  // assign chapter tag
  var ch=getChapter(curQ);
  h+='<span class="q-tag t'+(['t1','t2','t3','t4','t5'][ch%5])+'">'+ch+'</span>';
  h+='<div class="q-text">'+(q.t==="判断"?"【判断题】":"【单选题】")+q.q+'</div>';
  h+='<div class="opts">';
  for(var i=0;i<q.o.length;i++){
    var cls='opt';
    if(submitted&&reviewMode){
      if(i===q.a)cls+=' correct show-correct';
      if(answered===i&&i!==q.a)cls+=' wrong';
    }else if(answered===i){
      cls+=' selected';
    }
    h+='<div class="'+cls+'" onclick="selectOpt('+i+')">'+String.fromCharCode(65+i)+'. '+q.o[i]+'</div>';
  }
  h+='</div>';
  if(submitted&&reviewMode){
    var isRight=answered===q.a;
    h+='<div class="q-result show '+(isRight?'right':'wrong-r')+'">'+(isRight?'✅ 回答正确':'❌ 回答错误')+'<br>解析：'+q.c+'</div>';
  }
  h+='</div>';
  s.innerHTML=h;
  document.getElementById('pageInfo').textContent=(curQ+1)+'/'+QS.length;
  document.getElementById('progressBar').style.width=(Object.keys(answers).length/QS.length*100)+'%';
  document.getElementById('btnPrev').disabled=curQ===0;
  var btnNext=document.getElementById('btnNext');
  if(curQ===QS.length-1&&!submitted){
    btnNext.textContent='提交试卷';
    btnNext.className='bbtn bbtn-submit';
    btnNext.onclick=submitExam;
  }else{
    btnNext.textContent='下一题';
    btnNext.className='bbtn bbtn-next';
    btnNext.onclick=nextQ;
    btnNext.disabled=curQ===QS.length-1;
  }
}

function getChapter(idx){
  if(idx<8)return"毛发结构";
  if(idx<19)return"链键系统";
  if(idx<26)return"化学原理";
  if(idx<30)return"烫型体系";
  if(idx<35)return"药水配比";
  if(idx<40)return"沙性发质";
  if(idx<45)return"发质诊断";
  if(idx<51)return"软化操作";
  if(idx<55)return"软化监测";
  if(idx<59)return"冲洗标准";
  if(idx<70)return"卷杠手法";
  if(idx<80)return"加热系统";
  if(idx<84)return"定型流程";
  if(idx<87)return"烫后养护";
  if(idx<90)return"造型落地";
  if(idx<95)return"翻车分析";
  if(idx<98)return"三大铁律";
  return"综合";
}

function selectOpt(i){
  if(submitted)return;
  answers[curQ]=i;
  renderQ();
}

function prevQ(){if(curQ>0){curQ--;renderQ();}}
function nextQ(){if(curQ<QS.length-1){curQ++;renderQ();}}

function submitExam(){
  var unanswered=QS.length-Object.keys(answers).length;
  if(unanswered>0){
    if(!confirm('还有'+unanswered+'题未作答，确定提交吗？'))return;
  }
  submitted=true;
  renderResult();
}

function renderResult(){
  document.getElementById('examScreen').style.display='none';
  document.getElementById('bottomBar').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  var right=0;
  for(var i=0;i<QS.length;i++){
    if(answers[i]===QS[i].a)right++;
  }
  var score=right;
  var pct=(right/QS.length*100).toFixed(0);
  var rank=score>=95?'S 级·大师':score>=85?'A 级·优秀':score>=70?'B 级·合格':'C 级·需补考';
  var rankCls=score>=95?'s':score>=85?'a':score>=70?'b':'c';
  var wrong=QS.length-right;
  var s=document.getElementById('resultScreen');
  s.innerHTML='<div class="result-screen">'+
    '<div class="icon">'+(score>=80?'🏆':'📚')+'</div>'+
    '<h2>'+(score>=80?'恭喜通过！':'继续加油！')+'</h2>'+
    '<div class="score">'+score+'<span> / '+QS.length+'</span></div>'+
    '<div class="rank '+rankCls+'">'+rank+'</div>'+
    '<div class="stats">'+
    '<div><span>正确题数</span><b style="color:#16a34a">'+right+'</b></div>'+
    '<div><span>错误题数</span><b style="color:#dc2626">'+wrong+'</b></div>'+
    '<div><span>正确率</span><b>'+pct+'%</b></div>'+
    '<div><span>及格线</span><b>80分</b></div>'+
    '</div>'+
    '<button class="rbtn rbtn-review" onclick="reviewExam()">📖 查看解析</button>'+
    '<button class="rbtn rbtn-retry" onclick="retryExam()">🔄 重新考试</button>'+
    '</div>';
  document.getElementById('progressBar').style.width='100%';
}

function reviewExam(){
  reviewMode=true;
  curQ=0;
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('examScreen').style.display='block';
  document.getElementById('bottomBar').style.display='block';
  renderQ();
}

function retryExam(){
  curQ=0;answers={};submitted=false;reviewMode=false;
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
  document.getElementById('progressBar').style.width='0%';
}
</script>
</body>
</html>
