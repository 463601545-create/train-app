<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>高阶热烫内训考试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f5f5;color:#333;min-height:100vh;overflow-x:hidden}
.top{background:linear-gradient(135deg,#1a56db,#1e40af);color:#fff;padding:14px 16px;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.top h1{font-size:17px;font-weight:700;text-align:center}
.top .info{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;opacity:.9}
.top .bar{height:4px;background:rgba(255,255,255,.3);border-radius:2px;margin-top:8px}
.top .bar div{height:100%;background:#4ade80;border-radius:2px;transition:width .3s}
.page{padding:60px 12px 90px;display:none}
.page.on{display:block}
/* 开始页 */
.s1{text-align:center;padding:60px 16px 40px}
.s1 .ico{font-size:56px;margin-bottom:12px}
.s1 h2{font-size:22px;font-weight:800;color:#1e40af}
.s1 .desc{font-size:13px;color:#888;margin:8px 0 28px;line-height:1.6}
.s1 .box{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:28px;text-align:left;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.s1 .box p{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;border-bottom:1px solid #f3f3f3}
.s1 .box p:last-child{border:none}
.s1 .box span:last-child{font-weight:700;color:#1e40af}
.gobtn{background:linear-gradient(135deg,#1a56db,#1e40af);color:#fff;border:none;padding:15px 56px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(26,86,219,.3)}
.gobtn:active{transform:scale(.97)}
/* 答题页 */
.qc{background:#fff;border-radius:12px;padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qc .num{font-size:12px;color:#999;margin-bottom:6px}
.qc .num b{color:#1e40af;font-size:15px}
.qc .qt{font-size:15.5px;line-height:1.7;font-weight:600;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:9px}
.ob{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14.5px;line-height:1.55;cursor:pointer;transition:all .15s;text-align:left}
.ob:active{transform:scale(.98)}
.ob .lt{min-width:26px;height:26px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:all .15s}
.ob.ok{border-color:#16a34a;background:#f0fdf4}
.ob.ok .lt{border-color:#16a34a;background:#16a34a;color:#fff}
.ob.no{border-color:#dc2626;background:#fef2f2}
.ob.no .lt{border-color:#dc2626;background:#dc2626;color:#fff}
.ob.hi{border-color:#16a34a;background:#f0fdf4}
.ob.hi .lt{border-color:#16a34a;background:#16a34a;color:#fff}
.ob.off{pointer-events:none}
.exp{margin-top:12px;padding:10px 12px;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;color:#555;display:none}
.exp.on{display:block}
/* 底栏 */
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 16px 20px;box-shadow:0 -2px 8px rgba(0,0,0,.08);display:none;z-index:200}
.btm .row{display:flex;gap:10px}
.btm button{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btm button:active{transform:scale(.97)}
.bprev{background:#f3f4f6;color:#666}
.bnext{background:#1a56db;color:#fff}
.bsub{background:#16a34a;color:#fff}
.bsub:disabled{background:#9ca3af}
/* 结果页 */
.rp{text-align:center;padding:30px 16px 100px}
.rp .circle{width:140px;height:140px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:8px solid #e5e7eb}
.rp .circle.pass{border-color:#16a34a}
.rp .circle.fail{border-color:#dc2626}
.rp .circle .sn{font-size:42px;font-weight:800}
.rp .circle .sl{font-size:12px;color:#999;margin-top:2px}
.rp .rt{font-size:20px;font-weight:800;margin-bottom:6px}
.rp .rs{font-size:13px;color:#888;margin-bottom:20px}
.rp .sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.rp .sc{background:#fff;border-radius:10px;padding:14px 8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rp .sc .sv{font-size:22px;font-weight:800}
.rp .sc .sv.g{color:#16a34a}
.rp .sc .sv.r{color:#dc2626}
.rp .sc .sv.b{color:#1a56db}
.rp .sc .svl{font-size:11px;color:#999;margin-top:2px}
.rbtn{display:inline-block;padding:13px 36px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin:4px}
.rreview{background:#f3f4f6;color:#333}
.rretry{background:linear-gradient(135deg,#1a56db,#1e40af);color:#fff}
/* 回顾 */
.rvtag{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0;margin-bottom:6px}
.rvtag button{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#666}
.rvtag button.on{background:#1e40af;color:#fff;border-color:#1e40af}
</style>
</head>
<body>

<div class="top" id="top">
<h1>🔥 高阶热烫内训考试</h1>
<div class="info"><span id="tl">100题纯选择题</span><span id="tr">00:00</span></div>
<div class="bar"><div id="pb" style="width:0%"></div></div>
</div>

<!-- 开始页 -->
<div class="page on" id="p1">
<div class="s1">
<div class="ico">📝</div>
<h2>高阶热烫全科内训</h2>
<p class="desc">3小时课程 · 100道选择题 · 80分及格</p>
<div class="box">
<p><span>题目数量</span><span>100题</span></p>
<p><span>题目类型</span><span>四选一</span></p>
<p><span>及格分数</span><span>80分</span></p>
<p><span>答题方式</span><span>逐题作答·即时反馈</span></p>
</div>
<button class="gobtn" onclick="go()">开始考试</button>
</div>
</div>

<!-- 答题页 -->
<div class="page" id="p2"></div>

<!-- 结果页 -->
<div class="page" id="p3"></div>

<div class="btm" id="btm">
<div class="row">
<button class="bprev" id="bPrev" onclick="nav(-1)">上一题</button>
<button class="bnext" id="bNext" onclick="nav(1)">下一题</button>
</div>
</div>

<script>
const Q=[
// === 第一章 毛发结构（1-12）===
{q:"头发属于什么类型的组织？",o:["有生命的活细胞组织","没有生命的死细胞组织","半活性细胞组织","可再生细胞组织"],a:1,e:"头发是没有生命的死细胞组织，没有代谢、没有修复、没有再生。"},
{q:"头发结构破坏后能否自愈？",o:["可以自行修复","只能表层修饰，无法自愈","可以通过护发完全恢复","经过一段时间可自然恢复"],a:1,e:"一旦结构破坏无法自愈，只能表层修饰。"},
{q:"毛小皮（表皮层）的排列方式是？",o:["螺旋状排列","鱼鳞状瓦片式重叠排列","网状交叉排列","环形包裹排列"],a:1,e:"毛小皮呈鱼鳞状、瓦片式重叠排列。"},
{q:"毛小皮有多少层结构？",o:["1-3层","3-5层","6-10层","10-15层"],a:2,e:"毛小皮为6-10层结构。"},
{q:"以下哪项不是毛小皮决定的因素？",o:["光泽","锁水性","卷度记忆","顺滑度"],a:2,e:"毛小皮决定光泽、顺滑、锁水性、质感细腻度，卷度记忆在皮质层。"},
{q:"所有护发素、精油、发膜作用于头发的哪一层？",o:["皮质层","髓质层","毛小皮（表皮层）","三层同时作用"],a:2,e:"护发产品只作用于表皮层，无法修复内部受损结构。"},
{q:"关于护发和烫染的关系，正确的是？",o:["护发可以修复内部受损结构","护发是修饰，烫染是改芯","护发和烫染作用相同","护发比烫染更重要"],a:1,e:"护发是修饰，烫染是改芯。"},
{q:"皮质层占头发体积的比例约为？",o:["30%-50%","50%-75%","75%-90%","90%-100%"],a:2,e:"皮质层占头发体积75%-90%。"},
{q:"以下哪项不属于皮质层包含的内容？",o:["弹性","颜色","髓质结构","链键系统"],a:2,e:"皮质层包含弹性、韧性、颜色、卷度记忆、链键系统，髓质层是独立结构。"},
{q:"所有烫发、拉直、塑形改变的是头发哪一层？",o:["毛小皮","皮质层","髓质层","三层同时改变"],a:1,e:"所有烫发、拉直、塑形，全部只改变皮质层内部结构。"},
{q:"关于髓质层，以下哪项正确？",o:["参与烫染化学反应","决定头发弹性","中心疏松中空结构，对烫发无影响","占头发体积最大"],a:2,e:"髓质层不参与任何烫染化学反应，对烫发无任何影响。"},
{q:"细软发质、浅色发质、受损发质的髓质层特征是？",o:["髓质层特别厚","大多无完整髓质","髓质层最活跃","髓质层密度最高"],a:1,e:"细软、浅色、受损发质大多无完整髓质。"},

// === 第二章 四大链键（13-24）===
{q:"头发内部最强、最稳定的结构性键位是？",o:["氢键","盐键","二硫键","肽键"],a:2,e:"二硫键是头发内部最强、最稳定的结构性键位。"},
{q:"二硫键决定头发的什么？",o:["临时造型","光泽度","天生直卷、永久形态","支撑力"],a:2,e:"二硫键决定头发天生直、天生卷、永久形态。"},
{q:"烫发的完整逻辑顺序是？",o:["物理塑形→药水还原→氧化定型","氧化定型→药水还原→物理塑形","药水还原→物理塑形→氧化定型","药水还原→氧化定型→物理塑形"],a:2,e:"药水还原打断二硫键→物理塑形改变弧度→氧化定型重组二硫键。"},
{q:"二硫键重组意味着什么？",o:["临时卷度","半永久卷度","永久卷度记忆","可逆卷度"],a:2,e:"二硫键重组＝永久卷度记忆，水洗不掉、吹风不变。"},
{q:"头发烫完很快变直的根本原因是？",o:["杠子选错了","二硫键断裂不足、重组不彻底","加热时间太长","定型剂用少了"],a:1,e:"不是杠子问题，是二硫键断裂不足、重组不彻底。"},
{q:"数量最多、最弱、最活跃的键位是？",o:["二硫键","氢键","盐键","肽键"],a:1,e:"氢键数量最多、最弱、最活跃，完全可逆。"},
{q:"吹风造型、电棒造型改变的是哪个键？",o:["二硫键","氢键","盐键","肽键"],a:1,e:"吹风/电棒造型只改变氢键，所以洗头即恢复。"},
{q:"氢烫的原理是？",o:["主要改变二硫键","主要调整氢键形态","主要改变盐键","主要改变肽键"],a:1,e:"氢烫几乎不动二硫键，只调整氢键形态。"},
{q:"盐键受什么因素控制？",o:["温度","PH酸碱度","湿度","拉力"],a:1,e:"盐键受PH酸碱度控制，决定头发支撑力、弹性、紧实度。"},
{q:"碱性过强导致盐键流失后，头发会怎样？",o:["更卷更弹","软塌、无弹力、蓬松度差","变得更粗硬","颜色更亮"],a:1,e:"碱性过强流失盐键，头发软塌、无弹力、蓬松度差。"},
{q:"肽键断裂会导致什么后果？",o:["临时变形","头发碳化、棉化、粉碎性损伤，彻底不可逆","轻微受损可恢复","卷度不持久"],a:1,e:"肽键断裂＝碳化、棉化、粉碎性损伤，彻底不可逆。"},
{q:"正常烫发会不会破坏肽键？",o:["会，每次都破坏","不会，正常烫发不破坏肽键","取决于发质","取决于温度"],a:1,e:"肽键极强极稳定，正常烫发不会破坏。"},

// === 第三章 烫发三步化学原理（25-31）===
{q:"还原软化的原理是？",o:["酸性药水闭合毛鳞片","碱性药水打开毛鳞片进入皮质层断裂二硫键","高温加热改变结构","物理拉伸改变形态"],a:1,e:"碱性药水打开毛鳞片，进入皮质层，断裂部分二硫键。"},
{q:"门店核心铁律：软化必须怎样操作？",o:["干发操作","湿发操作","半干半湿操作","根据发质决定干湿"],a:1,e:"软化必须湿发操作，这是门店红线标准。"},
{q:"门店核心铁律：软化只能用什么稀释？",o:["护发素","蛋白液","清水","定型剂"],a:2,e:"软化只能用清水稀释浓度。"},
{q:"为什么软化全程禁止加入护理类产品？",o:["会改变颜色","护理成分成膜包裹结构，阻隔药水渗透","会让头发太滑","会降低温度"],a:1,e:"护理成分成膜包裹结构，包裹毛鳞片、阻隔药水渗透。"},
{q:"加入护理成分到软化剂中会导致什么？",o:["卷度更持久","假性软化、外软内硬、烫后反弹","头发更健康","软化更快"],a:1,e:"导致假性软化、外软内硬、烫后反弹、卷度不持久。"},
{q:"物理塑形的作用是？",o:["断裂二硫键","改变发丝空间曲线，为二硫键重组做精准定位","中和碱性","闭合毛鳞片"],a:1,e:"通过卷杠缠绕改变发丝空间曲线，为二硫键重组做精准定位。"},
{q:"氧化定型的原理是？",o:["继续打断二硫键","定型剂中和碱性、闭合毛鳞片、重新对接二硫键","高温加热固化","物理拉伸固定"],a:1,e:"定型剂中和碱性、闭合毛鳞片，重新对接二硫键，永久锁定卷度。"},

// === 第四章 四大烫型（32-35）===
{q:"冷烫的特点是？",o:["干湿双弹","常温反应、湿卷干塌、主打纹理蓬松","高温加热永久记忆","氢键塑形零损伤"],a:1,e:"冷烫常温反应、湿卷干塌、主打纹理蓬松。"},
{q:"热烫的核心优势是？",o:["只改变氢键","化学加热力双重记忆、干湿双弹","常温操作","零损伤"],a:1,e:"热烫化学加热力双重记忆、干湿双弹。"},
{q:"离子烫的原理是？",o:["化学还原软化","高温重置纤维结构、永久拉直","氢键调整","常温拉直"],a:1,e:"离子烫高温重置纤维结构、永久拉直。"},
{q:"氢烫持久度偏弱的原因是？",o:["用了低温","几乎不动二硫键，只调整氢键形态","药水太弱","加热时间短"],a:1,e:"氢烫只调整氢键形态，氢键完全可逆所以持久度偏弱。"},

// === 第五章 药水稀释+沙性处理（36-47）===
{q:"粗硬抗拒发的药水配比是？",o:["10:3稀释","10:5稀释","10:10稀释","原液操作"],a:3,e:"粗硬抗拒发使用原液操作。"},
{q:"健康原发的药水稀释比例是？",o:["原液操作","10:1~10:3","10:5~10:10","10:10~10:1000"],a:1,e:"健康原发10:1~10:3。"},
{q:"1-2度轻损发质的药水稀释比例是？",o:["10:1~10:3","10:3~10:5","10:5~10:10","10:10~10:1000"],a:1,e:"1-2度轻损10:3~10:5。"},
{q:"3-4度中损发质的药水稀释比例是？",o:["10:1~10:3","10:3~10:5","10:5~10:10","10:10~10:1000"],a:2,e:"3-4度中损10:5~10:10。"},
{q:"5-7度重度漂损的药水稀释比例是？",o:["10:3~10:5","10:5~10:10","10:10~10:1000","原液操作"],a:2,e:"5-7度重度漂损10:10~10:1000。"},
{q:"沙性自然卷发质最核心的问题是？",o:["发量太少","毛鳞片极度紊乱、发丝空洞大、极易脱水碳化","颜色太深","太粗太硬"],a:1,e:"沙性发质毛鳞片极度紊乱、发丝空洞大、极易脱水碳化。"},
{q:"沙性发质破冰处理使用的药水浓度是？",o:["原液","10:3","10:5","10:10超轻稀释"],a:3,e:"沙性破冰使用10:10超轻稀释药水。"},
{q:"沙性发质破冰的目的不包括？",o:["打开杂乱毛鳞片统一结构","提前锁住发丝水分","完成软化定型","防止后续软化蛋白大量流失"],a:2,e:"破冰的目的不是软化，是统一结构、锁水、防止蛋白流失。"},
{q:"沙发烫炸干枯毛躁的核心原因是什么？",o:["杠子太小","没有破冰、直接上浓药、发丝快速脱水蛋白流失","加热温度太低","定型时间不够"],a:1,e:"没破冰直接上浓药，发丝快速脱水、蛋白流失、结构崩塌。"},
{q:"沙性软化过程中出现泛黄发干应怎么处理？",o:["继续等待","立刻喷水保湿","加大药水浓度","冲水重做"],a:1,e:"出现泛黄发干立刻喷水保湿，杜绝脱水损伤。"},
{q:"刘海、面部侧区极度细软发质应如何处理？",o:["用原液操作","与头顶相同浓度","必须单独调低浓度预防软化过度","不用软化"],a:2,e:"极度细软发质必须单独调低浓度，预防软化过度。"},
{q:"沙性破冰完成后下一步应？",o:["直接加热","根据发质状态正常涂抹标准软化剂","直接卷杠","直接定型"],a:1,e:"破冰完成、发丝结构稳定、锁水到位后，正常涂抹标准软化剂。"},

// === 十级实操-发质诊断（48-52）===

let cur=0,ans={},timer,sec=0,done=false,review=false,filter='all';

function go(){
  document.getElementById('p1').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  timer=setInterval(()=>{sec++;document.getElementById('tr').fmt(sec)},1000);
  render();
}

Number.prototype.fmt=function(s){
  let m=Math.floor(s/60),ss=s%60;
  return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
};

function render(){
  let q=Q[cur], el=document.getElementById('p2');
  let my=ans[cur], answered=my!==undefined;
  let h='<div class="qc"><div class="num">第 <b>'+(cur+1)+'</b> / 100 题</div>';
  h+='<div class="qt">'+q.q+'</div><div class="opts">';
  let letters=['A','B','C','D'];
  for(let i=0;i<4;i++){
    let cls='ob';
    if(answered){
      cls+=' off';
      if(i===q.a) cls+=' ok';
      if(i===my&&my!==q.a) cls+=' no';
      if(!done&&i===q.a&&my!==q.a) cls+=' hi';
    }
    h+='<div class="'+cls+'" onclick="pick('+i+')"><div class="lt">'+letters[i]+'</div><div>'+q.o[i]+'</div></div>';
  }
  h+='</div>';
  if(answered){
    h+='<div class="exp on">💡 '+(my===q.a?'回答正确！':'❌ 正确答案：'+letters[q.a]+'。')+q.e+'</div>';
  }else{
    h+='<div class="exp"></div>';
  }
  h+='</div>';
  
  if(review&&done){
    let tags='<div class="rvtag"><button class="'+(filter==='all'?'on':'')+'" onclick="flt(\'all\')">全部</button>';
    tags+='<button class="'+(filter==='wrong'?'on':'')+'" onclick="flt(\'wrong\')">❌ 错题</button>';
    tags+='<button class="'+(filter==='right'?'on':'')+'" onclick="flt(\'right\')">✅ 对题</button></div>';
    h=tags+h;
  }
  
  el.innerHTML=h;
  
  document.getElementById('pb').style.width=((cur+1)/100*100)+'%';
  document.getElementById('tl').textContent=(cur+1)+'/100';
  
  let nb=document.getElementById('bNext');
  let pb=document.getElementById('bPrev');
  pb.style.display=cur>0?'block':'none';
  
  if(cur===99&&!done){
    nb.textContent='交卷';nb.className='bsub';nb.onclick=submit;
  }else if(done){
    nb.textContent=review?'返回成绩':'查看成绩';nb.className='bsub';nb.onclick=showResult;
  }else{
    nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)};
  }
  if(done&&cur<99){nb.textContent='下一题';nb.className='bnext';nb.onclick=function(){nav(1)}}
}

function pick(i){
  if(ans[cur]!==undefined)return;
  ans[cur]=i;
  done||setTimeout(()=>{if(cur<99)nav(1);else render()},600);
  render();
}

function nav(d){
  let nc=cur+d;
  if(nc<0||nc>99)return;
  if(review&&filter!=='all'){
    let dir=d>0?1:-1;
    for(let j=nc;j>=0&&j<100;j+=dir){
      let isWrong=ans[j]!==Q[j].a;
      if(filter==='wrong'&&isWrong){nc=j;break}
      if(filter==='right'&&!isWrong){nc=j;break}
      if(j===0||j===99){return}
    }
  }
  cur=nc;render();
  window.scrollTo(0,0);
}

function submit(){
  done=true;review=false;
  clearInterval(timer);
  showResult();
}

function showResult(){
  document.getElementById('p2').classList.remove('on');
  document.getElementById('btm').style.display='none';
  document.getElementById('p3').classList.add('on');
  
  let right=0;
  for(let i=0;i<100;i++) if(ans[i]===Q[i].a) right++;
  let wrong=100-right;
  let score=right;
  let pass=score>=80;
  
  let el=document.getElementById('p3');
  let h='<div class="rp">';
  h+='<div class="circle '+(pass?'pass':'fail')+'"><div class="sn">'+score+'</div><div class="sl">分</div></div>';
  h+='<div class="rt">'+(pass?'🎉 恭喜通过':'💪 继续加油')+'</div>';
  h+='<div class="rs">'+(pass?'80分及格线，你已达标':'距及格还差'+(80-score)+'分，再接再厉')+'</div>';
  h+='<div class="sg"><div class="sc"><div class="sv g">'+right+'</div><div class="svl">答对</div></div>';
  h+='<div class="sc"><div class="sv r">'+wrong+'</div><div class="svl">答错</div></div>';
  h+='<div class="sc"><div class="sv b">'+sec.fmt(sec)+'</div><div class="svl">用时</div></div></div>';
  h+='<div style="margin-bottom:16px">';
  h+='<button class="rbtn rreview" onclick="reviewExam()">📖 查看解析</button>';
  h+='<button class="rbtn rretry" onclick="retry()">🔄 重新考试</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function reviewExam(){
  review=true;filter='all';cur=0;
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p2').classList.add('on');
  document.getElementById('btm').style.display='block';
  render();
}

function retry(){
  cur=0;ans={};sec=0;done=false;review=false;filter='all';
  document.getElementById('p3').classList.remove('on');
  document.getElementById('p1').classList.add('on');
  document.getElementById('pb').style.width='0%';
  document.getElementById('tl').textContent='100题纯选择题';
  document.getElementById('tr').textContent='00:00';
  clearInterval(timer);
}

function flt(f){
  filter=f;render();
}
</script>
